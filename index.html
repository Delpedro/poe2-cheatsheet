<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PoE2 Cheatsheet</title>
<style>
:root {
  --bg: #0c0c0e; --bg-panel: #141418; --bg-elev: #1a1a20;
  --border: #252530; --border-bright: #333340;
  --text: #d8d8e0; --text-dim: #7a7a88; --text-bright: #fff;
  --accent: #6aaef5; --gem-skill: #f0a830; --gem-spirit: #be7ef8;
  --gem-support: #58aad8; --item: #5ec878; --passive: #e87848;
  --boss: #f05050; --done: #44aa55;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 17px; }
body { font-family: -apple-system,'Segoe UI',system-ui,sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; -webkit-font-smoothing: antialiased; }

.topbar { display: flex; align-items: center; justify-content: space-between; padding: 0.55rem 1.2rem; background: #08080b; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; gap: 10px; flex-wrap: wrap; }
.topbar h1 { font-size: 0.95rem; font-weight: 700; color: var(--text-bright); }
.topbar .sub { font-size: 0.65rem; color: var(--text-dim); }
.topbar-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.build-select { background: var(--bg-elev); border: 1px solid var(--border-bright); color: var(--text); font-family: inherit; font-size: 0.7rem; padding: 0.25rem 0.5rem; border-radius: 4px; cursor: pointer; }
.topbar-right a { font-size: 0.75rem; color: var(--accent); text-decoration: none; font-weight: 600; white-space: nowrap; }
.topbar-right a:hover { text-decoration: underline; }
.size-toggle { display: flex; align-items: center; gap: 3px; }
.sz-btn { background: var(--bg-elev); border: 1px solid var(--border-bright); color: var(--text-dim); font-family: inherit; font-weight: 700; cursor: pointer; border-radius: 4px; padding: 2px 7px; font-size: 10px; transition: all 0.12s; }
.sz-btn:hover { border-color: var(--accent); color: var(--text-bright); }
.sz-btn.active { background: var(--accent); border-color: var(--accent); color: #08080b; }
.launch-btn { background: var(--boss); border-color: var(--boss); color: #fff; padding: 2px 10px; }

.tabs { display: flex; background: #08080b; border-bottom: 1px solid var(--border); padding: 0 1.2rem; position: sticky; top: 46px; z-index: 99; overflow-x: auto; }
.tab { padding: 0.5rem 0.85rem; color: var(--text-dim); cursor: pointer; font-size: 0.75rem; font-weight: 700; border-bottom: 3px solid transparent; display: flex; flex-direction: column; align-items: center; gap: 1px; white-space: nowrap; transition: color 0.12s; }
.tab:hover { color: var(--text); }
.tab.active { color: var(--text-bright); border-bottom-color: var(--accent); }
.tab .tsub { font-size: 0.6rem; color: var(--text-dim); font-weight: 400; }
.tab.active .tsub { color: var(--accent); }

.page { display: none; padding: 0.65rem 1rem 0.75rem; }
.page.active { display: block; }

.act-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 0.4rem; }
.act-head h2 { font-size: 1.15rem; font-weight: 700; color: var(--text-bright); }
.act-head .lvl { font-size: 0.6rem; color: var(--text-dim); letter-spacing: 0.15em; font-weight: 700; }

.combat-bar { display: flex; align-items: center; flex-wrap: wrap; gap: 0.2rem 0.32rem; padding: 0.32rem 0.75rem; margin-bottom: 0.32rem; background: rgba(106,174,245,0.05); border: 1px solid rgba(106,174,245,0.18); border-radius: 5px; }
.cb-label { font-size: 0.58rem; color: var(--accent); font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; margin-right: 4px; }
.cb-step { background: rgba(106,174,245,0.14); border: 1px solid rgba(106,174,245,0.3); padding: 0.18rem 0.6rem; color: var(--text-bright); font-weight: 700; border-radius: 4px; font-size: 0.78rem; white-space: nowrap; }
.cb-arrow { color: var(--text-dim); font-size: 0.82rem; }
.cb-note { font-size: 0.65rem; color: var(--text-dim); width: 100%; line-height: 1.4; margin-top: 2px; }

.passive-bar { display: flex; align-items: center; flex-wrap: wrap; gap: 0.2rem 0.28rem; padding: 0.25rem 0.75rem; margin-bottom: 0.4rem; background: rgba(232,120,72,0.05); border: 1px solid rgba(232,120,72,0.18); border-radius: 5px; }
.pb-label { font-size: 0.58rem; color: var(--passive); font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; margin-right: 4px; }
.pb-step { background: rgba(232,120,72,0.1); border: 1px solid rgba(232,120,72,0.22); color: var(--passive); padding: 0.15rem 0.48rem; border-radius: 3px; font-size: 0.65rem; font-weight: 700; white-space: nowrap; }
.pb-arrow { color: var(--text-dim); font-size: 0.65rem; }

/* 3-COLUMN LAYOUT */
.act-grid { display: grid; grid-template-columns: 1.2fr 0.95fr 0.82fr; gap: 0.75rem; align-items: start; }
.left-stack { display: flex; flex-direction: column; gap: 0.45rem; }
/* Compact gems — notes in modal on click */
.gnote { display: none; }
.gem { cursor: pointer; }
.gem:hover { background: rgba(106,174,245,0.04); }
/* Gem number badge */
.gem-num { min-width: 18px; height: 18px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 0.55rem; font-weight: 800; color: var(--text-dim); background: var(--bg-elev); border-radius: 3px; margin-right: 3px; align-self: center; }
/* Critical tag */
.tag-crit { color: var(--boss); border-color: rgba(240,80,80,0.4); background: rgba(240,80,80,0.1); }

.panel { background: var(--bg-panel); border: 1px solid var(--border); padding: 0.75rem 0.85rem; border-radius: 8px; }
.panel-hd { font-size: 0.6rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-dim); font-weight: 800; margin-bottom: 0.55rem; padding-bottom: 0.42rem; border-bottom: 1px solid var(--border); }

/* GEM ROWS — single-line compact */
.gem { display: flex; align-items: center; gap: 0.35rem; padding: 0.18rem 0 0.18rem 0.45rem; border-left: 3px solid var(--gem-skill); border-bottom: 1px solid var(--border); }
.gem:last-child { border-bottom: none; }
.gem.sp  { border-left-color: var(--gem-spirit); }
.gem.pas { border-left-color: var(--passive); }
.gem.asc { border-left-color: var(--gem-spirit); }
.gem-ico { width: 24px; height: 24px; border-radius: 3px; flex-shrink: 0; object-fit: cover; background: var(--bg-elev); }
.gem-ico-ph { width: 24px; height: 24px; border-radius: 3px; flex-shrink: 0; background: var(--bg-elev); }
.gem-txt { flex: 1; min-width: 0; display: flex; flex-wrap: wrap; align-items: baseline; gap: 0 5px; }
.gname { color: var(--gem-skill); font-weight: 800; font-size: 0.82rem; line-height: 1.4; }
.gname.sp { color: var(--gem-spirit); }
.gpair { color: var(--text-dim); font-weight: 500; font-size: 0.72rem; }
.gwhere { font-size: 0.58rem; color: var(--text-dim); }
.gnote  { display: none; }
.tag { display: inline-block; font-size: 0.52rem; letter-spacing: 0.04em; padding: 1px 4px; border: 1px solid var(--border-bright); color: var(--text-dim); text-transform: uppercase; margin-left: 3px; vertical-align: middle; border-radius: 3px; font-weight: 700; }
.tag-w { color: var(--passive);    border-color: rgba(232,120,72,0.35); }
.tag-s { color: var(--gem-spirit); border-color: rgba(190,126,248,0.35); }
.tag-a { color: var(--gem-spirit); border-color: rgba(190,126,248,0.35); }

/* SUPPORT CARDS */
.sc { background: var(--bg-elev); border: 1px solid var(--border); border-left: 3px solid var(--gem-skill); border-radius: 5px; padding: 0.42rem 0.58rem; margin-bottom: 0.38rem; }
.sc:last-child { margin-bottom: 0; }
.sc.sp { border-left-color: var(--gem-spirit); }
.sc-hd { display: flex; align-items: center; gap: 6px; margin-bottom: 0.25rem; }
.sc-ico { width: 22px; height: 22px; border-radius: 3px; flex-shrink: 0; object-fit: cover; background: var(--bg-panel); }
.sc-title { font-size: 0.8rem; color: var(--gem-skill); font-weight: 800; }
.sc.sp .sc-title { color: var(--gem-spirit); }
.sc-list { list-style: none; font-size: 0.72rem; color: var(--text); line-height: 1.55; }
.sc-list li { display: flex; align-items: center; gap: 4px; padding: 1px 0; }
.sc-list .sp-ico { width: 18px; height: 18px; border-radius: 2px; flex-shrink: 0; object-fit: cover; background: var(--bg-panel); }
.sc-list .sp-dot { width: 18px; height: 18px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: var(--gem-support); font-weight: 800; font-size: 12px; }

/* RIGHT COLUMN — BOSS / EVENTS / CHOICES */
.right-stack { display: flex; flex-direction: column; gap: 0.55rem; }
.boss-card { background: rgba(240,80,80,0.06); border: 1px solid rgba(240,80,80,0.22); border-left: 3px solid var(--boss); border-radius: 5px; padding: 0.48rem 0.6rem; }
.boss-name { font-size: 0.68rem; color: var(--boss); font-weight: 800; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 0.3rem; }
.boss-steps { list-style: none; font-size: 0.72rem; color: var(--text); line-height: 1.55; }
.boss-steps li { padding: 0 0 0 0.85rem; position: relative; }
.boss-steps li::before { content: '→'; position: absolute; left: 0; color: var(--boss); font-weight: 800; font-size: 0.65rem; }
.events-card { background: rgba(94,200,120,0.05); border: 1px solid rgba(94,200,120,0.2); border-left: 3px solid var(--item); border-radius: 5px; padding: 0.48rem 0.6rem; }
.events-title { font-size: 0.58rem; color: var(--item); font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.3rem; }
.ev-item { padding: 0.3rem 0 0.3rem 0.95rem; position: relative; border-bottom: 1px solid var(--border); font-size: 0.68rem; line-height: 1.35; }
.ev-item:last-child { border-bottom: none; }
.ev-item::before { content: '★'; position: absolute; left: 0; color: var(--item); font-size: 0.52rem; top: 0.48rem; }
.ev-reward { color: var(--item); font-weight: 700; }
.ev-loc { color: var(--text-dim); font-size: 0.62rem; margin-left: 5px; }
.choices-card { background: rgba(240,168,48,0.05); border: 1px solid rgba(240,168,48,0.2); border-left: 3px solid var(--gem-skill); border-radius: 5px; padding: 0.48rem 0.6rem; }
.choices-title { font-size: 0.58rem; color: var(--gem-skill); font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.3rem; }
.ch-item { padding: 0.3rem 0 0.3rem 0.95rem; position: relative; border-bottom: 1px solid var(--border); font-size: 0.68rem; line-height: 1.35; }
.ch-item:last-child { border-bottom: none; }
.ch-item::before { content: '→'; position: absolute; left: 0; color: var(--gem-skill); font-weight: 800; font-size: 0.65rem; top: 0.3rem; }
.ch-pick { color: var(--done); font-weight: 700; display: block; }
.ch-loc { color: var(--text-dim); font-size: 0.62rem; display: block; }
.ch-alts { font-size: 0.6rem; color: var(--text-dim); margin-top: 0.18rem; line-height: 1.55; }
.ch-alts span { display: inline-block; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 3px; padding: 1px 5px; margin: 1px 2px 1px 0; }
.ch-item.perm { background: rgba(240,80,80,0.07); border-left: 3px solid var(--boss); padding-left: 0.65rem; margin-left: -3px; }
.ch-item.perm .ch-pick { color: var(--boss); }
.perm-warn { font-size: 0.5rem; letter-spacing: 0.1em; font-weight: 800; color: var(--boss); text-transform: uppercase; display: block; margin-bottom: 2px; }

/* SUPPORT PRIORITY */
.pri-badge { font-size: 0.45rem; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 800; padding: 1px 5px; border-radius: 2px; margin-left: 5px; vertical-align: middle; }
.pri-badge.core { background: rgba(240,168,48,0.25); color: var(--gem-skill); }
.pri-badge.sec  { background: rgba(106,174,245,0.18); color: var(--accent); }
.pri-badge.util { background: rgba(122,122,136,0.15); color: var(--text-dim); }
.sc.pri-core { border-left-color: var(--gem-skill); }
.sc.pri-sec  { border-left-color: var(--accent); }
.sc.pri-util { border-left-color: var(--border-bright); opacity: 0.6; }

/* EVENT CHECKBOXES */
.ev-item { display: flex; align-items: flex-start; gap: 0.45rem; }
.ev-item::before { display: none; }
.ev-check { width: 14px; height: 14px; accent-color: var(--done); cursor: pointer; flex-shrink: 0; margin-top: 0.28rem; }
.ev-item.done { opacity: 0.3; }
.ev-item.done .ev-reward { text-decoration: line-through; }

/* INTERLUDE */
.il-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

/* ENDGAME */
.eg-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(14rem, 1fr)); gap: 0.6rem; }

/* TOOLS */
.tools-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 0.85rem; margin-bottom: 0.85rem; }
.rx-block { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 5px; padding: 0.6rem 0.72rem; margin-bottom: 0.6rem; }
.rx-label { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.3rem; }
.rx-lt { font-size: 0.72rem; color: var(--gem-skill); font-weight: 700; }
.rx-src { font-size: 0.6rem; color: var(--text-dim); font-style: italic; }
.rx-code { background: var(--bg); border: 1px solid var(--border); border-radius: 3px; padding: 0.42rem 0.55rem; font-family: 'SF Mono',Consolas,Monaco,monospace; font-size: 0.7rem; color: var(--text-bright); word-break: break-all; line-height: 1.5; margin-bottom: 0.4rem; }
.copy-btn { padding: 0.25rem 0.65rem; background: var(--accent); border: none; color: #08080b; font-family: inherit; font-size: 0.65rem; font-weight: 700; cursor: pointer; border-radius: 4px; letter-spacing: 0.04em; }
.copy-btn:hover { background: #8cc4ff; }
.copy-btn.copied { background: var(--done); }
.dl-btn { padding: 0.25rem 0.65rem; background: var(--bg-elev); border: 1px solid var(--item); color: var(--item); font-family: inherit; font-size: 0.65rem; font-weight: 700; cursor: pointer; border-radius: 4px; letter-spacing: 0.04em; margin-left: 8px; }
.dl-btn:hover { background: rgba(94,200,120,0.15); }
.rx-edit { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 3px; padding: 0.42rem 0.55rem; font-family: 'SF Mono',Consolas,Monaco,monospace; font-size: 0.7rem; color: var(--text-bright); resize: vertical; min-height: 3rem; margin-bottom: 0.4rem; }
.rx-edit:focus { outline: none; border-color: var(--accent); }
.link-list { list-style: none; }
.link-list li { padding: 0.42rem 0; border-bottom: 1px solid var(--border); }
.link-list li:last-child { border-bottom: none; }
.link-list a { color: var(--accent); text-decoration: none; font-weight: 600; font-size: 0.75rem; display: block; }
.link-list a:hover { text-decoration: underline; }
.link-list .ld { font-size: 0.62rem; color: var(--text-dim); margin-top: 2px; }
.notes-ta { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 0.55rem 0.65rem; font-family: inherit; font-size: 0.75rem; color: var(--text); resize: vertical; min-height: 9rem; line-height: 1.6; }
.notes-ta:focus { outline: none; border-color: var(--accent); }
.save-ok { font-size: 0.62rem; color: var(--done); margin-top: 4px; opacity: 0; transition: opacity 0.3s; }
.save-ok.show { opacity: 1; }
#mOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; padding: 1.2rem; }
#mBox { background: var(--bg-panel); border: 1px solid var(--border-bright); border-radius: 10px; max-width: 32rem; width: 100%; max-height: 85vh; overflow-y: auto; padding: 1.2rem 1.4rem; }
::-webkit-scrollbar { width: 7px; } ::-webkit-scrollbar-track { background: var(--bg); } ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 4px; }
.alert-item { border-left: 3px solid var(--boss); background: rgba(240,80,80,0.07); border-radius: 5px; padding: 0.65rem 0.85rem; margin-bottom: 0.75rem; }
.alert-item:last-of-type { margin-bottom: 1rem; }
.alert-title { color: var(--boss); font-weight: 800; font-size: 0.9rem; margin-bottom: 0.3rem; }
.alert-body { color: var(--text); font-size: 0.78rem; line-height: 1.55; }
.alert-hd { font-size: 0.65rem; color: var(--text-dim); letter-spacing: 0.12em; text-transform: uppercase; font-weight: 800; margin-bottom: 0.85rem; }
.alert-ok { display: block; width: 100%; padding: 0.55rem; background: var(--boss); border: none; color: #fff; font-family: inherit; font-size: 0.82rem; font-weight: 800; cursor: pointer; border-radius: 5px; letter-spacing: 0.04em; }
.alert-ok:hover { background: #ff7070; }
</style>
</head>
<body>

<div class="topbar">
  <div><h1 id="bName"></h1><div class="sub" id="bSub"></div></div>
  <div class="topbar-right">
    <div class="size-toggle">
      <button type="button" class="sz-btn" onclick="setSize(15)">S</button>
      <button type="button" class="sz-btn" onclick="setSize(18)">M</button>
      <button type="button" class="sz-btn" onclick="setSize(22)">L</button>
      <button type="button" class="sz-btn" onclick="setSize(27)">XL</button>
    </div>
    <select id="bSelect" class="build-select" title="Select build" onchange="switchBuild(this.value)"></select>
    <a id="bLink" href="#" target="_blank">Guide →</a>
    <button type="button" class="sz-btn launch-btn" onclick="openLaunchChecklist()">⚡ Launch</button>
  </div>
</div>
<div class="tabs" id="tabBar"></div>
<div id="pages"></div>
<div id="mOverlay" onclick="closeMifBg(event)"><div id="mBox"></div></div>

<script>
// ═══════════════════════════════════════════════════════
// ICON REGISTRY
// ═══════════════════════════════════════════════════════
const CDN = 'https://cdn.mobalytics.gg/cdn-cgi/image/format=auto';
const SI = n => `${CDN},width=40,height=40/assets/poe-2/images/game/Art/2DArt/SkillIcons/${n}.webp`;
const SU = n => `${CDN},width=28/assets/poe-2/images/game/Art/2DItems/Gems/New/NewSupport/${n}.webp`;

const SKILL_ICONS = {
  'Falling Thunder':   SI('MonkLightningStrike'),
  'Killing Palm':      SI('MonkKillingPalm'),
  'Frozen Locust':     SI('MonkIceAmbush'),
  'Frost Bomb':        SI('SorceressFrostBomb'),
  'Wind Blast':        SI('MonkGaleStrikeSwing'),
  'Wing Blast':        SI('DruidWingBlast'),
  'Pounce':            SI('DruidWolfLeapAttack'),
  'Herald of Thunder': SI('HeraldOfThunderSkill'),
  'Devour':            SI('DruidDevourShock'),
  'Storm Wave':        SI('MonkStormWave'),
  'Siphoning Strike':  SI('MonkSiphoningStrike'),
  'Hand of Chayula':   SI('MonkHandOfChayula'),
  'Wind Dancer':       SI('RangerWindDancerSkill'),
  'Whirling Assault':  SI('MonkWhirlingAssault'),
  'Tempest Bell':      SI('MonkTempestBell'),
  'Staggering Palm':   SI('MonkWindPalm'),
  'Charged Staff':     SI('MonkChargedStaff'),

const SUPPORT_ICONS = {
  'Rage I':               SU('RageSupportGem'),
  'Rage II':              SU('RageSupportGem'),
  'Brink I':              SU('BrinkSupportGem'),
  'Thrill of the Kill':   SU('ThrilloftheKillSupportGem'),
  'Thrill of the Kill II':SU('ThrilloftheKillSupportGem'),
  'Impact Shockwave':     SU('ImpactShockwaveSupportGem'),
  'Rapid Attacks I':      SU('FasterAttackSupportGem'),
  'Elemental Armament I': SU('WeaponElementalDamageSupportGem'),
  'Elemental Armament II':SU('WeaponElementalDamageSupportGem'),
  'Elemental Armament':   SU('WeaponElementalDamageSupportGem'),
  'Fist of War I':        SU('FistofWarSupportGem'),
  'Fist of War II':       SU('FistofWarSupportGem'),
  'Perpetual Charge':     SU('PerpetualChargeSupportGem'),
  'Gorge':                SU('MortuarySupportGem'),
  'Charge Profusion I':   SU('MultipleChargesSupportGem'),
  'Shock':                SU('ConductionSupportGem'),
  'Lightning Exposure':   SU('LightningExposureSupportGem'),
  'Cooldown Recovery I':  SU('CooldownReductionSupportGem'),
  'Maim':                 SU('MaimSupportGem'),
  'Clarity I':            SU('ClaritySupportGem'),
  'Cannibalism I':        SU('CannibalismSupportGem'),
  'Blazing Critical':     SU('BlazingCritsSupportGem'),
  'Prolonged Duration II':SU('MoreDurationSupportGem'),
  'Innervate':            SU('InnervateSupportGem'),
  'Elemental Weakness':   SU('CurseEffectSupportGem'),
  'Elemental Focus':      SU('ElementalFocusSupportGem'),
  'Heavy Swing':          SU('MeleePhysicalDamageSupportGem'),
  'Magnified Area II':    SU('IncreasedAreaOfEffectSupportGem'),
  'Retreat II':           SU('RetreatingAssaultSupportGem'),
  'Multishot II':         SU('MultipleProjectilesSupportGem'),
};

// ═══════════════════════════════════════════════════════
// BUILD DATA
// ═══════════════════════════════════════════════════════
const BUILDS = [
  {
    id: 'pcm-05',
    name: 'Power Charge Martial Artist',
    version: '0.5 — Runes of Aldur · p4wnyhof',

const SIZES = [15, 18, 22, 27];
function setSize(px) {
  document.documentElement.style.fontSize = px + 'px';
  localStorage.setItem('poe2_fs', px);
  document.querySelectorAll('.sz-btn').forEach((b,i) => b.classList.toggle('active', SIZES[i] === px));
}
(function(){ const s = parseInt(localStorage.getItem('poe2_fs')||'18'); setSize(SIZES.includes(s)?s:18); })();

// RENDER
// ═══════════════════════════════════════════════════════
let current = null;

function renderBuild(b) {
  current = b;
  document.getElementById('bName').textContent = b.name;
  document.getElementById('bSub').textContent = b.version;
  document.getElementById('bLink').href = b.guideUrl;

  const tabBar = document.getElementById('tabBar');
  tabBar.innerHTML = '';
  const allTabs = [
    ...b.acts.map(a => ({id:a.id,label:a.label,sub:a.sub})),
    {id:'interlude',label:'Interlude',sub:'Events'},
    {id:'ascendancy',label:'Ascendancy',sub:'All Nodes'},
    {id:'gear',label:'Gear',sub:'Per Act'},
    {id:'endgame',label:'Endgame',sub:'Hollow Focus'},
    {id:'tools',label:'Tools',sub:'Links · Regex'}
  ];
  allTabs.forEach(t => {
    const d = document.createElement('div');
    d.className = 'tab'; d.dataset.tab = t.id;
    d.innerHTML = `${t.label}<span class="tsub">${t.sub}</span>`;
    d.onclick = () => switchTab(t.id);
    tabBar.appendChild(d);
  });

  const pc = document.getElementById('pages');
  pc.innerHTML = '';
  b.acts.forEach(a => pc.appendChild(buildActPage(a)));
  if (b.interlude) pc.appendChild(buildInterludePage(b.interlude));
  pc.appendChild(buildAscendancyPage());
  pc.appendChild(buildGearPage());
  pc.appendChild(buildEndgamePage(b.endgame));
  pc.appendChild(buildToolsPage(b));

  const saved = localStorage.getItem(`poe2_tab_${b.id}`);
  switchTab(saved && allTabs.find(t=>t.id===saved) ? saved : b.acts[0].id);
}

function buildActPage(a) {
  const p = document.createElement('div');
  p.className = 'page'; p.id = a.id;
  const bid = current ? current.id : 'b';

  const loopHtml = a.loop.steps.map((s,i) =>
    (i>0?'<span class="cb-arrow">→</span>':'')+`<span class="cb-step">${esc(s)}</span>`
  ).join('');
  const passHtml = a.passives.map((s,i) =>
    (i>0?'<span class="pb-arrow">→</span>':'')+`<span class="pb-step">${esc(s)}</span>`
  ).join('');

  // GEMS — compact rows, click opens modal
  let gemIdx = 0;
  const gemsHtml = a.gems.map(g => {
    const t = g.type || '';
    const rowClass = t==='sp'?'sp':t==='pas'?'pas':t==='asc'?'asc':'';
    const tags = (g.tags||[]).map(x => {
      const c = x==='Wyvern'?'tag-w':(x==='Spirit'||x==='Aura'||x==='NEW 0.5'?'tag-s':(x.startsWith('Asc')||x==='Decision')?'tag-a':x==='CRITICAL'?'tag-crit':'');
      return `<span class="tag ${c}">${esc(x)}</span>`;
    }).join('');
    const paired = g.paired?` <span class="gpair">+ ${esc(g.paired)}</span>`:'';
    const iconUrl = SKILL_ICONS[g.name] || SKILL_ICONS[g.name.split(' →')[0].trim()];
    const iconHtml = iconUrl
      ? `<img class="gem-ico" src="${iconUrl}" alt="${g.name}" onerror="this.style.display='none'">`
      : `<div class="gem-ico-ph"></div>`;
    const isAction = (t === 'pas' || t === 'asc');
    const numHtml = !isAction ? `<span class="gem-num">${++gemIdx}</span>` : '';
    const src = g.source ? `<span class="gwhere">· ${esc(g.source)}</span>` : '';
    const hasDetail = !!(g.note);
    const click = hasDetail ? `onclick="openGemModal(${JSON.stringify(esc(g.name))},${JSON.stringify(esc(g.source||''))},${JSON.stringify(esc(g.note||''))})"` : '';
    return `<div class="gem ${rowClass}" ${click}>${numHtml}${iconHtml}<div class="gem-txt"><span class="gname ${t==='sp'?'sp':''}">${esc(g.name)}</span>${paired}${tags}${src}</div></div>`;
  }).join('');

  // SUPPORTS — with priority badges
  const supportsHtml = a.supports.map(s => {
    const ico = SKILL_ICONS[s.name] || SKILL_ICONS[s.name.split(' ')[0]];
    const icoHtml = ico ? `<img class="sc-ico" src="${ico}" alt="${s.name}" onerror="this.style.display='none'">` : '';
    const items = s.items.map(item => {
      const spIco = SUPPORT_ICONS[item];
      const spHtml = spIco ? `<img class="sp-ico" src="${spIco}" alt="${item}" onerror="this.style.display='none'">` : `<span class="sp-dot">+</span>`;
      return `<li>${spHtml}<span>${esc(item)}</span></li>`;
    }).join('');
    const priLabel = s.pri==='core'?'Core':s.pri==='sec'?'Sec':s.pri==='util'?'Util':'';
    const priBadge = priLabel ? `<span class="pri-badge ${s.pri}">${priLabel}</span>` : '';
    const priClass = s.pri ? `pri-${s.pri}` : '';
    return `<div class="sc ${s.type==='sp'?'sp':''} ${priClass}"><div class="sc-hd">${icoHtml}<span class="sc-title">${esc(s.name)}${priBadge}</span></div><ul class="sc-list">${items}</ul></div>`;
  }).join('');

  // BOSS
  const bossHtml = a.boss ? `<div class="boss-card"><div class="boss-name">⚔ ${esc(a.boss.name)}</div><ul class="boss-steps">${a.boss.steps.map(s=>`<li>${esc(s)}</li>`).join('')}</ul></div>` : '';

  // EVENTS — checkboxes
  const eventsHtml = a.events && a.events.length ? `
    <div class="events-card">
      <div class="events-title">★ Don't Miss — tick when grabbed</div>
      ${a.events.map((e,i)=>{
        const key=`ev_${bid}_${a.id}_${i}`;
        const done=localStorage.getItem(key)?'done':'';
        const chk=localStorage.getItem(key)?'checked':'';
        return `<div class="ev-item ${done}" id="evi_${key}"><input type="checkbox" class="ev-check" ${chk} onchange="toggleEv('${key}',this)"><div><span class="ev-reward">${esc(e.reward)}</span><span class="ev-loc">${esc(e.who)} · ${esc(e.loc)}</span></div></div>`;
      }).join('')}
    </div>` : '';

  // CHOICES — permanent in red
  const choicesHtml = a.choices && a.choices.length ? `
    <div class="choices-card"><div class="choices-title">⚑ Choices</div>
      ${a.choices.map(c=>{
        const permClass=c.perm?'perm':'';
        const permWarn=c.perm?'<span class="perm-warn">⚠ PERMANENT</span>':'';
        return `<div class="ch-item ${permClass}">${permWarn}<span class="ch-pick">✓ ${esc(c.pick)}</span>${c.alts?`<div class="ch-alts">${c.alts.map(x=>`<span>${esc(x)}</span>`).join('')}</div>`:''}<span class="ch-loc">${esc(c.loc||'')}</span></div>`;
      }).join('')}
    </div>` : '';

  p.innerHTML = `
    <div class="act-head"><h2>${esc(a.heading)}</h2><span class="lvl">${esc(a.sub.toUpperCase())}</span></div>
    <div class="combat-bar"><span class="cb-label">Loop</span>${loopHtml}<span class="cb-note">${esc(a.loop.note)}</span></div>
    <div class="passive-bar"><span class="pb-label">Passives</span>${passHtml}</div>
    <div class="act-grid">
      <div class="panel"><div class="panel-hd">Skill Gems — tap for detail</div>${gemsHtml}</div>
      <div class="panel"><div class="panel-hd">Support Links</div>${supportsHtml}</div>
      <div class="right-stack">${bossHtml}${eventsHtml}${choicesHtml}</div>
    </div>`;
  return p;
}

function switchTab(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab===id));
  document.querySelectorAll('.page').forEach(p => p.classList.toggle('active', p.id===id));
  if (current) localStorage.setItem(`poe2_tab_${current.id}`, id);
  const act = current && current.acts.find(a => a.id === id);
  if (act && act.alerts && act.alerts.length) {
    const box = document.getElementById('mBox');
    box.innerHTML = `<div class="alert-hd">⚠ Critical — read before you start this act</div>`
      + act.alerts.map(a => `<div class="alert-item"><div class="alert-title">${esc(a.title)}</div><div class="alert-body">${esc(a.body)}</div></div>`).join('')
      + `<button class="alert-ok" onclick="document.getElementById('mOverlay').style.display='none'">Got it — let's go</button>`;
    document.getElementById('mOverlay').style.display = 'flex';
  }
}
function initSelector() {
  const sel = document.getElementById('bSelect');
  BUILDS.forEach(b => { const o=document.createElement('option'); o.value=b.id; o.textContent=b.name; sel.appendChild(o); });
  const saved = localStorage.getItem('poe2_build');
  const b = BUILDS.find(x=>x.id===saved)||BUILDS[0];
  sel.value = b.id;
  renderBuild(b);
}
function switchBuild(id) {
  const b = BUILDS.find(x=>x.id===id); if(!b) return;
  localStorage.setItem('poe2_build', id); renderBuild(b);
}

// DOWNLOAD .BUILD FILE
// ═══════════════════════════════════════════════════════
function downloadBuild() {
  const b = current;
  if (!b || !b.buildJson) return;
  const blob = new Blob([b.buildJson], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `${b.name}.build`; a.click();
  URL.revokeObjectURL(url);
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function copyEl(id,btn){ navigator.clipboard.writeText(document.getElementById(id)?.textContent||'').then(()=>flash(btn)); }
function copyTA(id,btn){ navigator.clipboard.writeText(document.getElementById(id)?.value||'').then(()=>flash(btn)); }
function flash(btn){ const o=btn.textContent; btn.textContent='✓ Copied'; btn.classList.add('copied'); setTimeout(()=>{btn.textContent=o;btn.classList.remove('copied');},1500); }

function toggleEv(key, cb) {
  const row = document.getElementById('evi_' + key);
  if (cb.checked) { localStorage.setItem(key,'1'); row && row.classList.add('done'); }
  else { localStorage.removeItem(key); row && row.classList.remove('done'); }
}
document.addEventListener('keydown', e=>{ if(e.key==='Escape') document.getElementById('mOverlay').style.display='none'; });
let _st=null;
function debSave(){
  clearTimeout(_st); _st=setTimeout(()=>{
    const r=document.getElementById('uRx'), n=document.getElementById('uNotes'), s=document.getElementById('saveOk');
    if(r) localStorage.setItem('poe2_rx',r.value);
    if(n) localStorage.setItem('poe2_notes',n.value);
    if(s){s.classList.add('show');setTimeout(()=>s.classList.remove('show'),1200);}
  },500);
}
